[project]
name = "atc-telemetry"
version = "0.1.0"
description = "Shared OTel span/metric emission helpers for ATC services"
requires-python = ">=3.12"
dependencies = [
    "opentelemetry-api>=1.27",
    "opentelemetry-exporter-otlp-proto-http>=1.43.0",
    "opentelemetry-sdk>=1.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/atc_telemetry"]

[dependency-groups]
dev = [
    "pytest>=9.1.1",
]
