<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ATC - Air Traffic Control</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>ATC <span class="tag">Air Traffic Control for Autonomous Agents</span></h1>
    <span id="connection-status">connecting...</span>
  </header>

  <main>
    <section id="pending-section">
      <h2>Pending Approvals</h2>
      <div id="pending-list" class="card-list">
        <div class="empty-state">No actions awaiting approval.</div>
      </div>
    </section>

    <section id="fleet-section">
      <h2>Fleet</h2>
      <div id="fleet-list" class="card-list">
        <div class="empty-state">Loading agents...</div>
      </div>
    </section>

    <section id="recent-section">
      <h2>Recent Decisions</h2>
      <div id="recent-list" class="card-list">
        <div class="empty-state">No decided actions yet.</div>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
